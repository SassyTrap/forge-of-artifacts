<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Checkers | Minimalist Design</title>
    <meta name="description" content="A beautiful 3D checkers board built with Three.js featuring a minimalist top-down perspective.">
  <script type="module" crossorigin src="/assets/index-GusbnqPv.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CR1KfEmX.css">
</head>
<body>
    <!-- Main Menu Overlay -->
    <div id="main-menu" class="menu-overlay">
        <div class="menu-window">
            <div class="turn-titlebar">
                <div class="qp-titlebar-dots">
                    <span class="dot dot-close"></span>
                    <span class="dot dot-min"></span>
                    <span class="dot dot-max"></span>
                </div>
                <span class="qp-titlebar-text">Matchmaking</span>
            </div>
            <div class="menu-body">
                <h1>3D Checkers</h1>
                <input type="text" id="player-name" class="menu-input" placeholder="Enter your name" />
                <div class="menu-buttons">
                    <button id="btn-online" class="menu-btn primary">Play Online</button>
                    <button id="btn-offline" class="menu-btn secondary">Play Offline</button>
                </div>
                <div id="matchmaking-status" class="menu-status"></div>
            </div>
        </div>
    </div>

    <!-- Match Info Overlay (Only visible in online mode) -->
    <div id="match-info" class="match-info hidden">
        Playing against: <span id="opponent-name">...</span>
    </div>

    <div id="turn-indicator" class="turn-window hidden-ui">
        <div class="turn-titlebar">
            <div class="qp-titlebar-dots">
                <span class="dot dot-close"></span>
                <span class="dot dot-min"></span>
                <span class="dot dot-max"></span>
            </div>
            <span class="qp-titlebar-text">Game Status</span>
        </div>
        <div class="turn-body">
            <h2 id="turn-text">BLACK'S TURN</h2>
        </div>
    </div>

    <div class="qp-window left" id="qp-left">
        <div class="qp-titlebar">
            <div class="qp-titlebar-dots">
                <span class="dot dot-close"></span>
                <span class="dot dot-min"></span>
                <span class="dot dot-max"></span>
            </div>
            <span class="qp-titlebar-text">QP Bar — Black</span>
        </div>
        <div class="qp-body">
            <div class="qp-row">
                <div class="checker-icon small"></div>
                <div class="qp-bar-segments">
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                </div>
                <div class="checker-icon large"></div>
            </div>
            <div class="qp-status">Charge: 0 / 3</div>
        </div>
    </div>

    <div class="qp-window right" id="qp-right">
        <div class="qp-titlebar">
            <div class="qp-titlebar-dots">
                <span class="dot dot-close"></span>
                <span class="dot dot-min"></span>
                <span class="dot dot-max"></span>
            </div>
            <span class="qp-titlebar-text">QP Bar — Red</span>
        </div>
        <div class="qp-body">
            <div class="qp-row">
                <div class="checker-icon small"></div>
                <div class="qp-bar-segments">
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                </div>
                <div class="checker-icon large"></div>
            </div>
            <div class="qp-status">Charge: 0 / 3</div>
        </div>
    </div>

    <div id="canvas-container"></div>
    
</body>
</html>
