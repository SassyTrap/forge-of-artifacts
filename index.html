<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge of Artifacts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=MedievalSharp&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==================== SCREEN: ITEM CREATION ==================== -->
    <div id="create-screen" class="screen active">
        <div class="retro-border">
            <div class="retro-panel">
                <div class="panel-header">
                    <div class="panel-title-deco"></div>
                    <h1 class="panel-title">⚒ FORGE OF ARTIFACTS ⚒</h1>
                    <div class="panel-title-deco"></div>
                </div>

                <div class="panel-body">
                    <!-- Username -->
                    <div class="field-group">
                        <label class="retro-label">ADVENTURER NAME</label>
                        <input type="text" id="username-input" class="retro-input" placeholder="Enter thy name..."
                            maxlength="20" />
                    </div>

                    <!-- Item Description -->
                    <div class="field-group">
                        <label class="retro-label">DESCRIBE YOUR ITEM</label>
                        <textarea id="item-desc-input" class="retro-input retro-textarea"
                            placeholder="A glowing crystal orb pulsing with dark energy..." rows="3"
                            maxlength="200"></textarea>
                        <div class="char-counter"><span id="char-count">0</span>/200</div>
                    </div>

                    <!-- Item Type Selection -->
                    <div class="field-group">
                        <label class="retro-label">ITEM TYPE</label>
                        <div class="type-selector">
                            <button class="type-btn selected" data-type="offense" onclick="selectType(this)">
                                <span class="type-icon">⚔️</span>
                                <span class="type-name">Offense</span>
                            </button>
                            <button class="type-btn" data-type="support" onclick="selectType(this)">
                                <span class="type-icon">🛡️</span>
                                <span class="type-name">Support</span>
                            </button>
                            <button class="type-btn" data-type="summoning" onclick="selectType(this)">
                                <span class="type-icon">✨</span>
                                <span class="type-name">Summoning</span>
                            </button>
                        </div>
                    </div>

                    <!-- Forge Button -->
                    <button id="forge-btn" class="retro-btn forge-btn" onclick="forgeItem()">
                        <span class="forge-btn-text" id="forge-btn-text">⚒ FORGE ITEM ⚒</span>
                        <div class="forge-loader" id="forge-loader">
                            <span>.</span><span>.</span><span>.</span> FORGING
                            <span>.</span><span>.</span><span>.</span>
                        </div>
                    </button>

                    <div class="retro-error" id="create-error"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SCREEN: ITEM RESULT ==================== -->
    <div id="result-screen" class="screen">
        <div class="retro-border">
            <div class="retro-panel result-panel">
                <div class="panel-header">
                    <h1 class="panel-title">⚒ ITEM FORGED ⚒</h1>
                </div>
                <div class="panel-body result-body">
                    <div class="item-card">
                        <div class="item-image-frame">
                            <img id="result-image" src="" alt="Forged Item" />
                        </div>
                        <div class="item-details">
                            <h2 class="item-name" id="result-name">Loading...</h2>
                            <div class="item-stars" id="result-stars"></div>
                            <div class="item-category" id="result-category"></div>
                            <div class="item-rarity" id="result-rarity"></div>
                            <div class="item-type-badge" id="result-type-badge"></div>
                            <p class="item-description" id="result-description"></p>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button class="retro-btn" onclick="addToInventoryAndContinue()">✓ ADD TO WORLD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SCREEN: 3D HUB WORLD ==================== -->
    <div id="hub-screen" class="screen">
        <canvas id="renderCanvas"></canvas>

        <!-- HUD Overlay -->
        <div class="hub-hud">
            <div class="hud-top">
                <div class="hud-player">
                    <span class="hud-icon">👤</span>
                    <span id="hud-username" class="hud-name">Adventurer</span>
                </div>
                <div class="hud-items-count">
                    <span class="hud-icon">🎒</span>
                    <span id="hud-item-count">0</span> Items
                </div>
            </div>
            <div class="hud-bottom">
                <button class="hud-btn" onclick="openInventory()">🎒 Inventory</button>
                <button class="hud-btn" onclick="goBackToForge()">⚒ Forge</button>
            </div>
        </div>

        <!-- Building Selection Tooltip -->
        <div class="building-tooltip" id="building-tooltip">
            <span id="tooltip-text">Market</span>
        </div>
    </div>

    <!-- ==================== OVERLAY: INVENTORY ==================== -->
    <div id="inventory-overlay" class="overlay">
        <div class="retro-border overlay-border">
            <div class="retro-panel inventory-panel">
                <div class="panel-header">
                    <h1 class="panel-title">🎒 INVENTORY 🎒</h1>
                    <button class="close-btn" onclick="closeInventory()">✕</button>
                </div>
                <div class="panel-body inventory-body" id="inventory-grid">
                    <p class="inventory-empty" id="inventory-empty">Your inventory is empty. Go forge some items!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== OVERLAY: MARKET ==================== -->
    <div id="market-overlay" class="overlay">
        <div class="retro-border overlay-border">
            <div class="retro-panel">
                <div class="panel-header">
                    <h1 class="panel-title">🏪 MARKET 🏪</h1>
                    <button class="close-btn" onclick="closeMarket()">✕</button>
                </div>
                <div class="panel-body">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <button id="lootbox-btn" class="retro-btn" onclick="startLootboxSpin()">OPEN FREE
                            LOOTBOX</button>
                    </div>

                    <div class="spinner-window">
                        <div class="spinner-cursor"></div>
                        <div class="spinner-track" id="spinner-track">
                            <!-- Items populated by JS -->
                        </div>
                    </div>

                    <div id="lootbox-winner" class="lootbox-winner" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== OVERLAY: ARENA ==================== -->
    <div id="arena-overlay" class="overlay">
        <div class="retro-border overlay-border">
            <div class="retro-panel">
                <div class="panel-header">
                    <h1 class="panel-title">⚔️ ARENA ⚔️</h1>
                    <button class="close-btn" onclick="closeArena()">✕</button>
                </div>
                <div class="panel-body">
                    <p class="coming-soon">The arena is being prepared for battle.<br>Sharpen your blades, warrior!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
